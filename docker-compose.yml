services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: selcom_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-selcom_assessment}
      POSTGRES_USER: ${POSTGRES_USER:-selcom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-selcom_pass}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-selcom} -d ${POSTGRES_DB:-selcom_assessment}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Data pipeline (run once, then exits) ───────────────────────────────────
  pipeline:
    build: .
    container_name: selcom_pipeline
    command: sh -c "python sql/apply_schema.py && python run_pipeline.py"
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    volumes:
      - ./data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy

  # ── FastAPI RAG backend ────────────────────────────────────────────────────
  api:
    build: .
    container_name: selcom_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      CORS_ORIGINS: "http://localhost:3000,http://frontend:3000"
    ports:
      - "8000:8000"
    depends_on:
      pipeline:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js chat UI ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: selcom_frontend
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
