name: selcom-assessment

services:

  # ── 1. Database ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: selcom-postgres
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-selcom_assessment}
      POSTGRES_USER:     ${POSTGRES_USER:-selcom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-selcom_pass}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-selcom} -d ${POSTGRES_DB:-selcom_assessment}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── 2. Data pipeline (runs once, then exits) ──────────────────────────────────
  #
  #   Phases:
  #     [1/3] Apply schema   — CREATE TABLE IF NOT EXISTS + indexes
  #     [2/3] Load CSV data  — chunked COPY (100k rows/chunk) → PostgreSQL
  #     [3/3] Build summary  — INSERT … SELECT → transaction_summary (45 rows)
  #
  #   Watch live:  docker compose logs pipeline -f
  #
  pipeline:
    build: .
    container_name: selcom-pipeline
    command: >
      sh -c "
        echo '════════════════════════════════════════════' &&
        echo '  Starting Selcom Data Pipeline...'          &&
        echo '════════════════════════════════════════════' &&
        python sql/apply_schema.py &&
        python run_pipeline.py
      "
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    volumes:
      - ./data:/app/data:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── 3. FastAPI RAG backend ────────────────────────────────────────────────────
  #
  #   Starts only after pipeline exits successfully.
  #   POST /api/chat  — NL question → SQL → results → hallucination check → answer
  #   GET  /health    — liveness probe
  #
  api:
    build: .
    container_name: selcom-api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --log-level info
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      CORS_ORIGINS: "http://localhost:3000,http://chatbot-ui:3000"
    ports:
      - "8000:8000"
    depends_on:
      pipeline:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped

  # ── 4. Sele the Analyst — Next.js chat UI ────────────────────────────────────
  #
  #   Starts only after API passes its health check.
  #   Open:  http://localhost:3000
  #
  chatbot-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chatbot-ui
    ports:
      - "3000:3000"
    environment:
      BACKEND_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
